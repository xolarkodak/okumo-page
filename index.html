<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKUMO - Mobile Game Studio</title>
  <meta name="description" content="OKUMO is an independent mobile game studio creating unique experiences." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <section class="home-hero">
    <h1 class="logo-wordmark fade-up fade-up-1"><span>OKUMO</span></h1>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
