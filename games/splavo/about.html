<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splavo - About | OKUMO</title>
  <meta name="description" content="Learn about Splavo by OKUMO." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Game Header ──────────────────────────────── -->
  <header class="game-header fade-up">

    <a class="game-back" href="/">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      All Games
    </a>

    <div class="game-title-row">
      <!-- game-icon: game.js will inject <img> here -->
      <div class="game-title-icon" id="game-icon"></div>
      <div class="game-title-text">
        <h1 id="game-title">…</h1>
        <p class="game-genre" id="game-genre">…</p>
      </div>
    </div>

    <nav class="tab-nav" role="tablist">
      <a class="tab-btn" data-tab="about"   href="about.html"   role="tab">About</a>
      <a class="tab-btn" data-tab="privacy" href="privacy.html" role="tab">Privacy Policy</a>
      <a class="tab-btn" data-tab="terms"   href="terms.html"   role="tab">Terms of Use</a>
    </nav>

  </header>

  <!-- ── About Content ────────────────────────────── -->
  <main class="page-content fade-up fade-up-2">

    <!-- Description - filled by game.js -->
    <p class="about-description" id="game-description">…</p>

    <!-- Meta chips - values filled by game.js -->
    <div class="about-meta">
      <div class="meta-chip">🎮 <strong>Genre</strong>&nbsp;<span id="game-genre-chip">…</span></div>
      <div class="meta-chip">📱 <strong>Platform</strong>&nbsp;<span id="meta-platform">…</span></div>
      <div class="meta-chip">🏢 <strong>Developer</strong>&nbsp;<span id="meta-developer">…</span></div>
    </div>

    <!-- Store links - shown/hidden + href filled by game.js -->
    <div class="store-links">
      <a class="store-btn" id="google-play-link" href="#" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.18 23.76c.35.2.74.24 1.12.12l12.37-7.14-2.8-2.8-10.69 9.82zM.58 1.46C.22 1.82 0 2.38 0 3.1v17.8c0 .72.22 1.28.58 1.64l.08.08L10.2 13v-.22L.66 1.38l-.08.08zM20.12 9.56l-2.64-1.52-3.12 3.12 3.12 3.12 2.68-1.54c.76-.44.76-1.74-.04-2.18zM4.3.12L16.67 7.26 13.87 10.06 3.18.24C3.56.12 3.94.16 4.3.12z"/>
        </svg>
        Google Play
      </a>
    </div>

  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> OKUMO. All rights reserved. ·
      <a href="privacy.html">Privacy Policy</a> ·
      <a href="terms.html">Terms of Use</a>
    </p>
  </footer>

  <script src="/js/game.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    // Sync genre chip with main genre element after game.js runs
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const g = document.getElementById('game-genre');
        const c = document.getElementById('game-genre-chip');
        if (g && c && g.textContent !== '…') { c.textContent = g.textContent; observer.disconnect(); }
      });
      observer.observe(document.getElementById('game-genre') || document.body, { childList: true, subtree: true, characterData: true });
    });
  </script>
</body>
</html>
